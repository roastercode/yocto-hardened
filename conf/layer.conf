# SPDX-License-Identifier: MIT
#
# yocto-hardened-hpc — Hardened embedded Linux layer for HPC and space
# applications. Provides FTRFS (radiation-robust filesystem), Slurm HPC
# stack, and a reference arm64 cluster image validated on kernel 7.0.
#
# Maintainer: Aurelien DESBRIERES <aurelien@hackers.camp>
# Repository: https://github.com/roastercode/yocto-hardened
# Branch:     arm64-ftrfs

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "yocto-hardened-hpc"
BBFILE_PATTERN_yocto-hardened-hpc = "^${LAYERDIR}/"
BBFILE_PRIORITY_yocto-hardened-hpc = "6"

LAYERVERSION_yocto-hardened-hpc = "1"
LAYERSERIES_COMPAT_yocto-hardened-hpc = "scarthgap styhead"

LAYERDEPENDS_yocto-hardened-hpc = "core"
LAYERRECOMMENDS_yocto-hardened-hpc = "meta-oe"
