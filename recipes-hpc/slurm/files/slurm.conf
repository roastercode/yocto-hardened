# slurm.conf — configuration minimale pour le mini-labo HPC
ClusterName=hpclab
SlurmctldHost=master
SlurmUser=slurm
AuthType=auth/munge
StateSaveLocation=/var/lib/slurm
SlurmdSpoolDir=/var/lib/slurm/slurmd
SwitchType=switch/none
MpiDefault=none
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU_Memory
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
ReturnToService=2
SlurmctldTimeout=120
SlurmdTimeout=300
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
NodeName=compute01 NodeAddr=192.168.56.11 CPUs=4 RealMemory=462 State=UNKNOWN
NodeName=compute02 NodeAddr=192.168.56.12 CPUs=4 RealMemory=462 State=UNKNOWN
NodeName=compute03 NodeAddr=192.168.56.13 CPUs=4 RealMemory=462 State=UNKNOWN
PartitionName=compute Nodes=compute[01-03] Default=YES MaxTime=4:00:00 State=UP
