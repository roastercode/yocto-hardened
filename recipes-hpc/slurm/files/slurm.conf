# slurm.conf — generic HPC lab configuration
#
# NodeName and PartitionName entries are generated at image build time
# by the hpc-arm64-master.bb ROOTFS_POSTPROCESS_COMMAND using values
# from hpc-config.inc. Do not add node-specific entries here.
#
# To add nodes: edit hpc-config.inc and rebuild the master image.

ClusterName=@HPC_CLUSTER_NAME@
SlurmctldHost=@HPC_MASTER_HOSTNAME@
SlurmUser=slurm
AuthType=auth/munge
StateSaveLocation=/var/lib/slurm
SlurmdSpoolDir=/var/lib/slurm/slurmd
SwitchType=switch/none
MpiDefault=none
SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU_Memory
ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
ReturnToService=2
SlurmctldTimeout=120
SlurmdTimeout=300
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

# NodeName and PartitionName are appended here at build time
